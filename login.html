<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
}

.login-bg{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.box{
  background:white;
  padding:40px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
  display:block;
  width:200px;
  margin:15px auto;
  padding:10px;
  border:none;
  border-radius:5px;
  background:#4facfe;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#0077ff;
}
</style>

</head>

<body>

<div class="login-bg">
  <div class="box">
    <h2>Login</h2>
    <button onclick="alert('Student Login Clicked')">Student Login</button>
    <button onclick="alert('Staff Login Clicked')">Staff Login</button>
  </div>
</div>

</body>
</html>
