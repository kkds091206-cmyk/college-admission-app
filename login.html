<!DOCTYPE html>
<html>
<head>
<title>Smart Arts and Science College Finder</title>

<style>

body{
font-family:Arial;
background:#4facfe;
text-align:center;
margin-top:100px;
}

.container{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px;
width:95%;
background:#007BFF;
color:white;
border:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Smart College Finder</h2>

<h3>Register</h3>

<input type="text" id="regUser" placeholder="Create Username">

<input type="password" id="regPass" placeholder="Create Password">

<button onclick="register()">Register</button>

<hr>

<h3>Login</h3>

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="message"></p>

</div>

<script>

function register(){

var user=document.getElementById("regUser").value;
var pass=document.getElementById("regPass").value;

localStorage.setItem("username",user);
localStorage.setItem("password",pass);

document.getElementById("message").innerHTML="Registration Successful";

}

function login(){

var user=document.getElementById("loginUser").value;
var pass=document.getElementById("loginPass").value;

var storedUser=localStorage.getItem("username");
var storedPass=localStorage.getItem("password");

if(user==storedUser && pass==storedPass){

document.getElementById("message").innerHTML="Login Successful";

}
else{

document.getElementById("message").innerHTML="Invalid Username or Password";

}

}

</script>

</body>
</html>
