<!DOCTYPE html>
<html>
<head>
<title>Smart Arts and Science College Finder</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input,select{
width:90%;
padding:10px;
margin:10px;
}

button{
width:95%;
padding:10px;
background:#1d3f72;
color:white;
border:none;
margin-top:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Smart College Finder</h2>

<select id="role">
<option value="student">Student</option>
<option value="staff">Staff</option>
</select>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<br>

<label>
<input type="checkbox" onclick="showPassword()"> Show Password
</label>

<br><br>

<button onclick="register()">Register</button>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function showPassword(){

var x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}

}

function register(){

var role=document.getElementById("role").value;
var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

localStorage.setItem("role",role);
localStorage.setItem("username",user);
localStorage.setItem("password",pass);

document.getElementById("msg").innerHTML="Registration Successful";

}

function login(){

var role=document.getElementById("role").value;
var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

var storedRole=localStorage.getItem("role");
var storedUser=localStorage.getItem("username");
var storedPass=localStorage.getItem("password");

if(role==storedRole && user==storedUser && pass==storedPass){

window.location.href="home.html";

}
else{

document.getElementById("msg").innerHTML="Invalid Username or Password";

}

}

</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Home</title>
</head>

<body>

<h1>Welcome to Smart Arts and Science College Finder</h1>

<p>Login Successful</p>

</body>
</html>
