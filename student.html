<!DOCTYPE html>
<html>
<head>
  <title>Student Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <h2>Student Admission Form</h2>

  <form onsubmit="saveStudent(); return false;">
    <input id="name" placeholder="Student Name" required>
    <input id="mark" type="number" placeholder="12th Mark %" required>

    <select id="group">
      <option>BSc</option>
      <option>BBA</option>
      <option>BCom</option>
      <option>BA</option>
    </select>

    <input id="maxFee" type="number" placeholder="Max Fee per Semester" required>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
function saveStudent() {
  localStorage.setItem("studentName", name.value);
  localStorage.setItem("mark12", mark.value);
  localStorage.setItem("group", group.value);
  localStorage.setItem("maxFee", maxFee.value);
  window.location.href = "output.html";
}
</script>

</body>
</html>
